name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -SL -o app/libs/sherpa-onnx-1.13.1.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-1.13.1.aar
          ls -lh app/libs/

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease || true

      - name: List APK outputs
        run: find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;

      - name: Delete old release assets
        uses: andreaswilli/delete-release-assets-action@v3
        with:
          tags: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "声灵 v1.0.0 - 本地AI声音克隆"
          body: |
            🔊 声灵 - 完全离线的AI声音克隆工具

            ✨ 功能特性：
            - 上传3-15秒参考音频，AI学习声音特征
            - 输入任意文本，用克隆的声音朗读
            - 完全离线运行，无需联网（模型首次使用时下载）
            - 基于ZipVoice零样本声音克隆模型 (INT8量化)
            - Material Design 3深色主题

            📦 模型说明：
            - 首次启动时自动下载ZipVoice INT8模型（约200MB）
            - 下载完成后完全离线使用
            - 支持中文和英文语音克隆

            ⚠️ 首次启动需要下载模型，请确保网络连接。
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
